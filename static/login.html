<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MONARCH PRO — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --amber: #ff8c00; --amber2: #ffb347; --green: #00d084; --red: #ff3b3b;
    --bg: #0a0a0a; --surface: #111; --border: #2a2a2a; --muted: #888;
    --mono: 'IBM Plex Mono', monospace;
  }
  body { background: var(--bg); color: #e8e8e8; font-family: var(--mono);
         display: flex; align-items: center; justify-content: center;
         min-height: 100vh; flex-direction: column; }
  .card { background: var(--surface); border: 1px solid var(--border);
          border-top: 3px solid var(--amber); padding: 40px 44px;
          max-width: 440px; width: 90%; text-align: center; }
  .logo { color: var(--amber); font-size: .70rem; font-weight: 700;
          letter-spacing: .22em; text-transform: uppercase; margin-bottom: 8px; }
  h1 { color: var(--amber); font-size: 1.05rem; font-weight: 700;
       letter-spacing: .16em; text-transform: uppercase; margin-bottom: 24px; }
  .status-row { display: flex; align-items: center; gap: 10px; justify-content: center;
                margin-bottom: 20px; font-size: .70rem; }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .token-preview { color: var(--muted); font-size: .65rem; }
  .btn { display: block; width: 100%; margin-top: 12px; padding: 11px 0;
         background: #140e00; color: var(--amber); border: 1px solid var(--amber);
         font-family: var(--mono); font-size: .72rem; font-weight: 700;
         letter-spacing: .12em; text-transform: uppercase; cursor: pointer;
         text-decoration: none; transition: background .15s, color .15s; }
  .btn:hover { background: var(--amber); color: #000; }
  .btn.secondary { background: transparent; border-color: #3a3a3a; color: var(--muted); margin-top: 8px; }
  .btn.secondary:hover { border-color: var(--amber2); color: var(--amber2); background: transparent; }
  .divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
  .paste-section { text-align: left; }
  .paste-label { color: var(--muted); font-size: .62rem; letter-spacing: .1em;
                 text-transform: uppercase; margin-bottom: 6px; display: block; }
  .paste-input { width: 100%; background: #0d0d0d; border: 1px solid #333;
                 color: #e8e8e8; font-family: var(--mono); font-size: .68rem;
                 padding: 8px 10px; outline: none; }
  .paste-input:focus { border-color: var(--amber); }
  .msg { font-size: .68rem; margin-top: 12px; min-height: 20px; }
  .msg.ok { color: var(--green); }
  .msg.err { color: var(--red); }
  .footer { margin-top: 14px; color: var(--muted); font-size: .60rem; }
  .footer a { color: var(--amber); text-decoration: none; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">◼ MONARCH PRO</div>
  <h1>Market Access</h1>

  <div class="status-row">
    <div class="dot" id="statusDot"></div>
    <span id="statusText" style="color:var(--muted)">Checking connection…</span>
    <span class="token-preview" id="tokenPreview"></span>
  </div>

  <a href="/auth/login" class="btn" id="otpBtn">Login with Upstox OTP</a>
  <a href="/" class="btn secondary" id="terminalBtn" style="display:none">▶ Open Terminal</a>

  <hr class="divider">

  <div class="paste-section">
    <label class="paste-label">Or paste access token manually</label>
    <input class="paste-input" id="tokenInput" type="text" placeholder="Bearer token…" autocomplete="off">
    <button class="btn secondary" onclick="pasteToken()" style="margin-top:8px">Save Token</button>
  </div>

  <div class="msg" id="msg"></div>
  <div class="footer">Token expires daily at midnight IST &nbsp;·&nbsp; <a href="https://account.upstox.com/developer/apps" target="_blank">Upstox Developer Portal</a></div>
</div>

<script>
async function checkStatus() {
  try {
    const r = await fetch('/auth/status');
    const d = await r.json();
    const dot = document.getElementById('statusDot');
    const txt = document.getElementById('statusText');
    const prev = document.getElementById('tokenPreview');
    const tbtn = document.getElementById('terminalBtn');
    const obtn = document.getElementById('otpBtn');
    if (d.connected) {
      dot.classList.add('connected');
      txt.textContent = 'Connected';
      txt.style.color = 'var(--green)';
      prev.textContent = d.prefix + '…';
      tbtn.style.display = 'block';
      obtn.textContent = 'Re-authenticate';
    } else {
      txt.textContent = 'Not connected';
      txt.style.color = 'var(--muted)';
    }
  } catch(e) {}
}

async function pasteToken() {
  const tok = document.getElementById('tokenInput').value.trim();
  const msg = document.getElementById('msg');
  if (!tok) { msg.textContent = 'Token is empty.'; msg.className = 'msg err'; return; }
  try {
    const r = await fetch('/auth/token', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({token: tok})
    });
    if (r.ok) {
      msg.textContent = '✔ Token saved. Redirecting…'; msg.className = 'msg ok';
      setTimeout(() => location.href = '/', 1200);
    } else {
      msg.textContent = 'Failed to save token.'; msg.className = 'msg err';
    }
  } catch(e) {
    msg.textContent = 'Error: ' + e.message; msg.className = 'msg err';
  }
}

checkStatus();
</script>
</body>
</html>
